<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Kyle Mitchell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #090c10;
      color: #e2e8f0;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(5rem, 20vw, 12rem);
      font-weight: 800;
      color: #00d4aa;
      line-height: 1;
      opacity: 0.15;
      user-select: none;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: -1rem;
      margin-bottom: 1rem;
    }
    p { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
    a {
      font-size: 0.8rem;
      color: #00d4aa;
      text-decoration: none;
      border: 1px solid rgba(0,212,170,0.3);
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    a:hover { background: rgba(0,212,170,0.1); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or has been moved.</p>
  <a href="index.html">← Back to home</a>
</body>
</html>
